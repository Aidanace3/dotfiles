# kitty config - pastel pink/purple theme based on wallpaper
# drop this in ~/.config/kitty/kitty.conf or source it

# fonts
font_family      JetBrains Mono
font_size        12

# window
remember_window_size  no
initial_window_width  120c
initial_window_height 40c
window_padding_width  12
window_margin_width   0
draw_minimal_borders  yes
hide_window_decorations no
background_opacity    0.92

# cursor
cursor_shape     beam
cursor_blink_interval 0.5

# scrollback
scrollback_lines 3000
scrollback_pager less +G -R

# bell
enable_audio_bell no
visual_bell_duration 0.0

# colors - soft pastel pink/purple gradient theme
foreground            #d8c8e8
background            #0f0a14
background_opacity    0.92

# pastel palette - actual soft colors
color0   #1a1220  # black
color1   #d98ba8  # red (soft pink)
color2   #b89fd0  # green (mauve)
color3   #d8b890  # yellow (dusty peach)
color4   #b8a8d8  # blue (soft lavender)
color5   #d8909d  # magenta (rose)
color6   #a8c8d8  # cyan (cool blue-grey)
color7   #c8b8d8  # white (pale purple)

color8   #2a1d30  # bright black
color9   #e0a8b8  # bright red
color10  #d0b8e0  # bright green
color11  #e8c8a0  # bright yellow
color12  #d0b8e8  # bright blue
color13  #e8a0b0  # bright magenta
color14  #b8d8e8  # bright cyan
color15  #d8c8e8  # bright white

# selection colors
selection_foreground #0f0a14
selection_background #d98ba8

# tab bar
tab_bar_edge              bottom
tab_bar_style             powerline
tab_powerline_style       angled
tab_title_template        {title}
active_tab_foreground     #1a1428
active_tab_background     #e8a8c8
inactive_tab_foreground   #b8a8d0
inactive_tab_background   #2d1f35

# keybinds (optional, customize as needed)
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+n new_window
map ctrl+shift+t new_tab
map ctrl+shift+w close_window
